<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NHK Easy News Handout Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/handout.css">
</head>
<body class="app app--light app--theme-green">
  <div class="app__overlay" id="loadingOverlay" hidden aria-hidden="true">
    <div class="app__spinner" role="status" aria-label="PDF 생성 중"></div>
    <p class="app__loading-text">PDF 생성 중…</p>
  </div>

  <header class="app__header">
    <div class="app__header-inner">
      <h1 class="app__title">NHK Easy News Handout Generator</h1>
      <div class="app__header-actions">
        <a class="btn btn--secondary" href="index.html">썸네일 생성기 →</a>
      </div>
    </div>
  </header>

  <main class="app__main">
    <section class="panel panel--form" aria-labelledby="formTitle">
      <div class="card">
        <h2 class="card__title" id="formTitle">핸드아웃 정보 입력</h2>

        <form class="form" id="handoutForm" novalidate>
          <div class="form__group">
            <label class="form__label" for="brandText">상단 브랜드명</label>
            <input class="form__input" type="text" id="brandText" value="NHK EASY NEWS" maxlength="40">
          </div>

          <div class="form__group">
            <label class="form__label" for="dateText">날짜 / 회차 (선택)</label>
            <input class="form__input" type="text" id="dateText" placeholder="예: 2026.07.13 또는 Day 23" maxlength="30">
          </div>

          <fieldset class="form__fieldset">
            <legend class="form__legend">① 오늘의 핵심 단어</legend>
            <div class="repeat-list" id="wordEntries"></div>
            <button type="button" class="btn btn--add" id="addWordBtn">+ 단어 추가</button>
          </fieldset>

          <fieldset class="form__fieldset">
            <legend class="form__legend">② 문법</legend>
            <div class="repeat-list" id="grammarEntries"></div>
            <button type="button" class="btn btn--add" id="addGrammarBtn">+ 문법 추가</button>
          </fieldset>

          <fieldset class="form__fieldset">
            <legend class="form__legend">③ 오늘의 복습 (선택 입력)</legend>

            <div class="form__group">
              <label class="form__label" for="review1">복습 1</label>
              <input class="form__input" type="text" id="review1" placeholder="비워두면 빈 줄로 표시됩니다" maxlength="60">
            </div>

            <div class="form__group">
              <label class="form__label" for="review2">복습 2</label>
              <input class="form__input" type="text" id="review2" placeholder="비워두면 빈 줄로 표시됩니다" maxlength="60">
            </div>

            <div class="form__group">
              <label class="form__label" for="review3">복습 3</label>
              <input class="form__input" type="text" id="review3" placeholder="비워두면 빈 줄로 표시됩니다" maxlength="60">
            </div>
          </fieldset>

          <fieldset class="form__fieldset">
            <legend class="form__legend">④ 일본 문화 알아보기</legend>

            <div class="form__group">
              <label class="form__label" for="cultureNote">내용</label>
              <textarea class="form__input form__textarea" id="cultureNote" rows="3" placeholder="예: 일본의 오봉(お盆) 명절과 성묘 풍습에 대해" maxlength="300"></textarea>
            </div>
          </fieldset>

          <div class="form__actions">
            <button type="button" class="btn btn--primary" id="savePdfBtn">
              <span class="btn__label">PDF 다운로드</span>
            </button>
          </div>
        </form>
      </div>
    </section>

    <section class="panel panel--preview" aria-labelledby="previewTitle">
      <h2 class="panel__title" id="previewTitle">미리보기 (A4)</h2>
      <div class="preview preview--a4">
        <div class="a4-scale">
          <article class="a4-page" id="handout" aria-label="핸드아웃 미리보기">
            <header class="a4-page__header">
              <span class="a4-page__brand" id="previewBrand">NHK EASY NEWS</span>
              <span class="a4-page__date" id="previewDate"></span>
            </header>

            <section class="a4-section">
              <h3 class="a4-section__title">오늘의 핵심 단어</h3>
              <div id="previewWords"></div>
            </section>

            <hr class="a4-divider">

            <section class="a4-section">
              <h3 class="a4-section__title">문법</h3>
              <div id="previewGrammars"></div>
            </section>

            <hr class="a4-divider" id="previewReviewDivider">

            <section class="a4-section" id="previewReviewSection">
              <h3 class="a4-section__title">오늘의 복습</h3>
              <ol class="a4-review" id="previewReviewList"></ol>
            </section>

            <hr class="a4-divider">

            <section class="a4-section">
              <h3 class="a4-section__title">일본 문화 알아보기</h3>
              <p class="a4-field__value a4-field__value--standalone" id="previewCultureNote"></p>
            </section>

            <p class="copyright">날개공방 : <a href="https://blog.naver.com/alas0213/">https://blog.naver.com/alas0213/</a> </p>
          </article>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.1/dist/html2pdf.bundle.min.js"></script>
  <script src="js/handout.js" type="module"></script>
</body>
</html>
